<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pocket Money</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #f0f9ff 0%, #fdf2f8 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    padding: 24px 16px 48px;
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 30px;
    color: #1e293b;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 28px;
  }
  .emoji-header { font-size: 36px; text-align: center; margin-bottom: 4px; }
  .cards { display: flex; flex-direction: column; gap: 20px; max-width: 480px; margin: 0 auto; }

  .card {
    background: white;
    border-radius: 28px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card.jonas { border: 3px solid #3B82F6; box-shadow: 0 8px 32px #3B82F622; }
  .card.ella  { border: 3px solid #EC4899; box-shadow: 0 8px 32px #EC489922; }

  .card-header { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 52px; height: 52px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .jonas .avatar { background: #DBEAFE; }
  .ella  .avatar { background: #FCE7F3; }
  .kid-name { font-family: 'Fredoka One', cursive; font-size: 22px; }
  .jonas .kid-name { color: #3B82F6; }
  .ella  .kid-name { color: #EC4899; }
  .next-topup { font-size: 11px; color: #94a3b8; font-weight: 700; }

  .balance-box { border-radius: 20px; padding: 16px 20px; text-align: center; }
  .jonas .balance-box { background: #DBEAFE; }
  .ella  .balance-box { background: #FCE7F3; }
  .balance-label {
    font-size: 11px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .jonas .balance-label { color: #3B82F6; }
  .ella  .balance-label { color: #EC4899; }
  .balance-amount { font-family: 'Fredoka One', cursive; font-size: 42px; line-height: 1.1; }
  .jonas .balance-amount { color: #3B82F6; }
  .ella  .balance-amount { color: #EC4899; }

  .mode-btns { display: flex; gap: 8px; }
  .mode-btn {
    flex: 1; padding: 8px 0; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .jonas .mode-btn { border: 2px solid #3B82F6; color: #3B82F6; background: white; }
  .ella  .mode-btn { border: 2px solid #EC4899; color: #EC4899; background: white; }
  .jonas .mode-btn.active { background: #3B82F6; color: white; }
  .ella  .mode-btn.active { background: #EC4899; color: white; }

  .input-row { display: flex; gap: 8px; }
  .input-row input[type=number] { flex: 1; }
  input[type=number], input[type=text] {
    padding: 10px 14px; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 15px;
    color: #1e293b; outline: none;
    width: 100%;
  }
  .jonas input { border: 2px solid #3B82F644; }
  .ella  input { border: 2px solid #EC489944; }
  input[type=text] { font-size: 13px; color: #64748b; }

  .ok-btn {
    padding: 10px 18px; border-radius: 12px; border: none;
    color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
    cursor: pointer; white-space: nowrap;
  }
  .jonas .ok-btn { background: #3B82F6; }
  .ella  .ok-btn { background: #EC4899; }

  .history-title {
    font-size: 12px; font-weight: 800; color: #94a3b8;
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
  }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-radius: 10px;
  }
  .history-item.weekly   { /* colored by kid below */ }
  .history-item.subtract { background: #FFF1F2; }
  .history-item.add, .history-item.init { background: #F0FDF4; }
  .jonas .history-item.weekly { background: #DBEAFE; }
  .ella  .history-item.weekly { background: #FCE7F3; }
  .history-note { font-weight: 700; font-size: 12px; color: #334155; }
  .history-date { font-size: 10px; color: #94a3b8; }
  .history-amount { font-family: 'Fredoka One', cursive; font-size: 15px; }
  .history-amount.positive.jonas { color: #3B82F6; }
  .history-amount.positive.ella  { color: #EC4899; }
  .history-amount.negative { color: #f43f5e; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>
<body>

<div class="emoji-header">🐷💰🐷</div>
<h1>Pocket Money</h1>
<p class="subtitle">CA$1.00 added automatically every week</p>

<div class="cards" id="cards"></div>

<script>
const KIDS = [
  { id: 'jonas', name: 'Jonas', emoji: '🚀' },
  { id: 'ella',  name: 'Ella',  emoji: '🌸' },
];
const WEEKLY = 1.00;
const CURRENCY = 'CA$';
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

function loadKid(id) {
  const raw = localStorage.getItem('pocket:' + id);
  if (raw) return JSON.parse(raw);
  return {
    balance: 0,
    lastWeeklyAdd: Date.now(),
    history: [{ type: 'init', amount: 0, note: 'Piggy bank started! 🐷', date: Date.now() }]
  };
}

function saveKid(id, data) {
  localStorage.setItem('pocket:' + id, JSON.stringify(data));
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

function nextTopup(lastAdd) {
  const remaining = WEEK_MS - (Date.now() - lastAdd);
  if (remaining <= 0) return 'Any moment now!';
  const days = Math.floor(remaining / 86400000);
  if (days === 0) return 'Today!';
  return `${days} day${days !== 1 ? 's' : ''}`;
}

const states = {};
const modes = {};

function applyWeekly() {
  const now = Date.now();
  for (const kid of KIDS) {
    const d = states[kid.id];
    const elapsed = now - d.lastWeeklyAdd;
    if (elapsed >= WEEK_MS) {
      const weeks = Math.floor(elapsed / WEEK_MS);
      const added = weeks * WEEKLY;
      d.balance = Math.round((d.balance + added) * 100) / 100;
      d.lastWeeklyAdd += weeks * WEEK_MS;
      d.history.unshift({
        type: 'weekly',
        amount: added,
        note: weeks > 1 ? `${weeks}× Weekly allowance 🎉` : 'Weekly allowance 🎉',
        date: now
      });
      saveKid(kid.id, d);
    }
  }
}

function renderHistory(kid) {
  const list = document.getElementById('history-' + kid.id);
  list.innerHTML = '';
  states[kid.id].history.slice(0, 20).forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item ' + h.type;
    const isNeg = h.type === 'subtract';
    item.innerHTML = `
      <div>
        <div class="history-note">${h.note}</div>
        <div class="history-date">${fmtDate(h.date)}</div>
      </div>
      <div class="history-amount ${isNeg ? 'negative' : 'positive ' + kid.id}">
        ${isNeg ? '-' : '+'}${CURRENCY}${h.amount.toFixed(2)}
      </div>`;
    list.appendChild(item);
  });
}

function renderBalance(kid) {
  document.getElementById('balance-' + kid.id).textContent = CURRENCY + ' ' + states[kid.id].balance.toFixed(2);
  document.getElementById('topup-' + kid.id).textContent = 'Next top-up: ' + nextTopup(states[kid.id].lastWeeklyAdd);
}

function handleAction(kid) {
  const input = document.getElementById('amount-' + kid.id);
  const noteEl = document.getElementById('note-' + kid.id);
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) { input.focus(); return; }
  const mode = modes[kid.id];
  const amount = mode === 'subtract' ? -val : val;
  const d = states[kid.id];
  d.balance = Math.round((Math.max(0, d.balance + amount)) * 100) / 100;
  d.history.unshift({
    type: mode,
    amount: val,
    note: noteEl.value.trim() || (mode === 'add' ? 'Added money' : 'Spent money'),
    date: Date.now()
  });
  saveKid(kid.id, d);
  renderBalance(kid);
  renderHistory(kid);
  input.value = '';
  noteEl.value = '';
}

function setMode(kid, mode) {
  modes[kid.id] = mode;
  ['add', 'subtract'].forEach(m => {
    const btn = document.getElementById('btn-' + m + '-' + kid.id);
    btn.classList.toggle('active', m === mode);
  });
}

function buildCard(kid) {
  states[kid.id] = loadKid(kid.id);
  modes[kid.id] = 'add';

  const card = document.createElement('div');
  card.className = 'card ' + kid.id;
  card.innerHTML = `
    <div class="card-header">
      <div class="avatar">${kid.emoji}</div>
      <div>
        <div class="kid-name">${kid.name}</div>
        <div class="next-topup" id="topup-${kid.id}"></div>
      </div>
    </div>
    <div class="balance-box">
      <div class="balance-label">Balance</div>
      <div class="balance-amount" id="balance-${kid.id}"></div>
    </div>
    <div class="mode-btns">
      <button class="mode-btn active" id="btn-add-${kid.id}" onclick="setMode(KIDS.find(k=>k.id==='${kid.id}'), 'add')">➕ Add</button>
      <button class="mode-btn" id="btn-subtract-${kid.id}" onclick="setMode(KIDS.find(k=>k.id==='${kid.id}'), 'subtract')">➖ Spend</button>
    </div>
    <div>
      <div class="input-row">
        <input type="number" id="amount-${kid.id}" min="0" step="0.01" placeholder="Amount">
        <button class="ok-btn" onclick="handleAction(KIDS.find(k=>k.id==='${kid.id}'))">OK</button>
      </div>
      <div style="height:8px"></div>
      <input type="text" id="note-${kid.id}" placeholder="What for? (optional)">
    </div>
    <div>
      <div class="history-title">History</div>
      <div class="history-list" id="history-${kid.id}"></div>
    </div>
  `;
  document.getElementById('cards').appendChild(card);

  renderBalance(kid);
  renderHistory(kid);
}

// Init
KIDS.forEach(buildCard);
applyWeekly();
KIDS.forEach(kid => { renderBalance(kid); renderHistory(kid); });
</script>
</body>
</html>
